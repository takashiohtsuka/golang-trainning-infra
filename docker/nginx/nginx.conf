server {
    listen 80;

    # Docker の DNS リゾルバ（IPv4 のみ）
    resolver 127.0.0.11 ipv6=off;

    # Next.js HMR WebSocket
    location /_next/webpack-hmr {
        set $nextjs http://host.docker.internal:3002;
        proxy_pass $nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Next.js (ホストで npm run dev 起動中)
    location / {
        set $nextjs http://host.docker.internal:3002;
        proxy_pass $nextjs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Go frontend API
    location /frontend/ {
        proxy_pass http://golang-trainning-frontend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Go backend API
    location /backend/ {
        proxy_pass http://golang-trainning-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
